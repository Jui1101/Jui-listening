<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>청각 재활 훈련</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#fff;
  margin:0;
  padding:20px;
  color:#111;
}

.card{
  background:#f7f8fa;
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
}

.btn{
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.btn-start{background:#34c759;color:#fff;}
.btn-next{background:#007aff;color:#fff;}
.btn-play{background:#eee;}

.vs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.vs button{
  padding:16px 30px;
  border-radius:999px;
  border:1px solid #ddd;
  background:#fff;
  font-size:20px;
  font-weight:800;
}

.vs button.correct{background:#e6fff4;border-color:#34c759;color:#34c759;}
.vs button.wrong{background:#ffeaea;border-color:#ff3b30;color:#ff3b30;}

.word{
  font-size:42px;
  text-align:center;
  margin:30px 0;
}
</style>
</head>

<body>

<div class="card">
  <div id="hint">단어를 재생해보세요</div>
  <div class="word" id="word">-</div>

  <div class="vs" id="vs"></div>

  <button class="btn btn-start" id="mainBtn" onclick="next()">시작</button>
  <button class="btn btn-play" onclick="play()">🔊</button>
</div>

<script>
let data = [
  ["오리","우리"],
  ["거리","고리"],
  ["다리","두리"],
  ["가지","바지"]
];

let current;
let answer;
let started=false;

function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';
  u.rate=0.72;
  u.pitch=0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function next(){
  // 버튼 초기화
  document.querySelectorAll(".vs button").forEach(b=>{
    b.classList.remove("correct","wrong");
  });

  current = data[Math.floor(Math.random()*data.length)];
  answer = current[Math.floor(Math.random()*2)];

  document.getElementById("word").textContent="•••";
  document.getElementById("hint").textContent="단어를 재생해보세요";

  // VS 버튼 생성
  let vs = document.getElementById("vs");
  vs.innerHTML="";

  current.forEach(w=>{
    let b=document.createElement("button");
    b.textContent=w;
    b.onclick=()=>check(b,w);
    vs.appendChild(b);
  });

  // UI 먼저 → 그 다음 음성 (아이폰 버그 해결)
  setTimeout(()=>{
    speak(answer);
  },150);

  if(!started){
    started=true;
    document.getElementById("mainBtn").textContent="다음";
    document.getElementById("mainBtn").className="btn btn-next";
  }
}

function play(){
  speak(answer);
}

function check(btn,word){
  document.querySelectorAll(".vs button").forEach(b=>{
    b.classList.remove("correct","wrong");
  });

  if(word===answer){
    btn.classList.add("correct");
  }else{
    btn.classList.add("wrong");
  }

  document.getElementById("word").textContent=answer;

  // 자동 다음
  setTimeout(next,800);
}
</script>

</body>
</html>
